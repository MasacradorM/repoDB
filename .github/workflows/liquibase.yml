name: Liquibase Migration
on:
  push:
    branches: [ main ]

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Download PostgreSQL Driver
        run: |
          wget -q https://jdbc.postgresql.org/download/postgresql-42.7.3.jar -O postgresql.jar

      - name: Run Liquibase
        uses: liquibase/liquibase-github-action@v4
        with:
          operation: update
          changeLogFile: changelog_master.yaml
          url: ${{ secrets.DB_URL }}
          username: ${{ secrets.DB_USER }}
          password: ${{ secrets.DB_PASS }}
          classpath: postgresql.jar
