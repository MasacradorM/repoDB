version: '3.8'

services:
  db:
    image: postgres:15
    container_name: db_liquibase
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  liquibase:
    image: liquibase/liquibase
    container_name: liquibase_runner
    depends_on:
      - db
    volumes:
      - ../:/liquibase/changelog
    command: >
      --url=jdbc:postgresql://db:5432/mydb
      --changeLogFile=changelog.yaml
      --username=user
      --password=password
      update